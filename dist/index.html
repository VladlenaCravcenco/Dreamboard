<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track and fund your dreams with smart savings">
  <meta name="theme-color" content="#B8924A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Dreamboard">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Dreamboard - Track & Fund Your Dreams</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  
  <script type="module" crossorigin src="/assets/index-BU-3yppg.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BVmhWs9C.css">
</head>
<body>
  <div id="root"></div>
  
  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (sessionStorage.getItem('dreamboard-sw-reloaded')) return;
        sessionStorage.setItem('dreamboard-sw-reloaded', 'true');
        window.location.reload();
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered:', registration);
            registration.update();
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
